name: Mirror to GitLab

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-to-gitlab
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Push main to GitLab
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
        run: |
          GITLAB_URL="https://oauth2:${GITLAB_TOKEN}@git.mooinglemur.com/ionium-ap/Archipelago-lobby.git"
          git remote add gitlab "$GITLAB_URL"

          # Populate refs/remotes/gitlab/main so --force-with-lease has a
          # reference point. If gitlab is empty / has no main yet, fall through
          # to a plain push for the initial sync.
          if git fetch gitlab main 2>/dev/null; then
            git push --force-with-lease gitlab main:main
          else
            git push gitlab main:main
          fi
